name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    name: build / vet / fmt / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      # The DB integration test skips automatically when DB_HOST is unset, so the
      # encoder golden vectors and the rest run here without a database.
      - name: go test (race)
        run: go test -race -count=1 ./...
