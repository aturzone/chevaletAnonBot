# ST1018 flags U+200C (ZERO WIDTH NON-JOINER) in string literals. That character
# is the Persian "نیم‌فاصله" — a normal, required part of the bot's Persian text
# (and of DELETION_TEXT, which must stay byte-for-byte identical to the original
# Python). Escaping it as ‌ would make the Persian source unreadable, so we
# disable this one check project-wide.
checks = ["all", "-ST1018"]
